<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>IPアドレス検索ツール</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="container">
    <h1>アドレス管理表</h1>

    <section class="search-panel" aria-label="検索">
      <label for="ipInput">検索ワード</label>
      <div class="search-row">
        <input id="ipInput" type="text" placeholder="例: 192.168.30.10 / Archer / static" autocomplete="off">
        <button id="searchButton" type="button">検索</button>
        <button id="clearButton" type="button">クリア</button>
      </div>
      <p id="statusText" class="status" role="status" aria-live="polite"></p>
    </section>

    <section aria-label="一覧">
      <h2>サブネット一覧</h2>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>サブネットアドレス</th>
              <th>VLAN有無</th>
              <th>VLAN番号</th>
            </tr>
          </thead>
          <tbody id="subnetBody"></tbody>
        </table>
      </div>
    </section>
<br>
    <section aria-label="一覧">
      <h2>hosts 一覧</h2>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>IP</th>
              <th>名称</th>
              <th>役割</th>
              <th>ネットワークID</th>
              <th>割当</th>
              <th>メモ</th>
            </tr>
          </thead>
          <tbody id="resultBody"></tbody>
        </table>
      </div>
    </section>
  </main>

  <script id="ipData" type="application/json">
  {
    "networks": [
      {
        "id": "home-lan",
        "cidr": "192.168.5.0/24",
        "vlan_id": 1,
        "gateway": "192.168.5.1",
        "dhcp": {
          "enabled": true,
          "range": {
            "start": "192.168.5.100",
            "end": "192.168.5.199"
          }
        }
      },
      {
      "id": "Routing-lan",
      "cidr": "192.168.10.0/24",
      "vlan_id": 10,
      "gateway": "192.168.10.1"
      },
      {
      "id": "Raspberry-lan",
      "cidr": "192.168.20.0/24",
      "vlan_id": 20,
      "gateway": "192.168.20.1"
      },
      {
      "id": "home-WiFi-guest-lan",
      "cidr": "192.168.30.0/24",
      "vlan_id": 30,
      "gateway": "192.168.30.1"
      },
      {
      "id": "Test-Environment-lan",
      "cidr": "192.168.40.0/24",
      "vlan_id": 40,
      "gateway": "192.168.40.1"
      }
    ],
    "hosts": [
      {
        "ip": "192.168.5.1",
        "name": "Archer AX23",
        "role": "WiFi-Router",
        "network_id": "home-lan",
        "assign": "static",
        "note": "固定IP"
      },
      {
        "ip": "192.168.5.5",
        "name": "Windows-PC",
        "role": "Main-PC_Desktop",
        "network_id": "home-lan",
        "assign": "static",
        "note": "固定IP"
      },
      {
        "ip": "192.168.5.9",
        "name": "iiyama-NotePC",
        "role": "Ubuntu-Server-PC",
        "network_id": "home-lan",
        "assign": "static",
        "note": "固定IP"
      },
      {
        "ip": "192.168.20.100",
        "name": "Raspberry-Pi",
        "role": "Mini-Server",
        "network_id": "Raspberry-lan",
        "assign": "static",
        "note": "固定IP"
      }
    ]
  }
  </script>

  <script src="app.js"></script>
</body>
</html>
